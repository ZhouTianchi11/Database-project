<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white rounded-xl shadow-lg w-full max-w-md p-8">
        <div class="text-center mb-8">
            <i class="fa-solid fa-store text-4xl text-blue-600 mb-2"></i>
            <h2 class="text-2xl font-bold text-gray-900">Customer Login</h2>
            <p class="text-gray-500">Sign in to your account</p>
        </div>

        <!-- 错误提示 -->
        {% if error %}
            <div class="mb-6 p-3 bg-red-100 text-red-700 rounded-lg text-center">
                {{ error }}
            </div>
        {% endif %}

        <!-- 成功提示 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-3 {{ 'bg-green-100 text-green-700' if category == 'success' else 'bg-red-100 text-red-700' }} rounded-lg text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- 登录表单 -->
        <form action="/user/login" method="post">
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>

        <!-- 测试账号提示 -->
        <div class="mt-6 text-center text-sm text-gray-500">
            <p>Test account: <span class="font-medium">user1</span> / <span class="font-medium">123456</span></p>
        </div>
    </div>
</body>
</html>
